name: Generated Code Quality

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  generated-warning-clean:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Check Compiler Crate
        run: cargo check -p rest_macro_core

      - name: Verify Expanded Output Snapshots
        run: cargo test -p vsra expand_server_code_ -- --nocapture

      - name: Verify Representative Examples Pass Strict Schema Checks
        run: |
          cargo run -p vsra -- check --input examples/template/api.eon --strict
          cargo run -p vsra -- check --input examples/cms/api.eon --strict
          cargo run -p vsra -- check --input examples/family_app/family_app.eon --strict

      - name: Verify Generated Projects Are Warning Clean
        run: cargo test -p vsra warning_clean -- --ignored --nocapture

      - name: Verify Representative Generated Projects Are Clippy Clean
        run: cargo test -p vsra clippy_clean -- --ignored --nocapture
