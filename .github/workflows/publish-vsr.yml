name: Publish VSR CLI

on:
  push:
    tags:
      - "vsra-v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Optional release tag to publish manually, for example vsra-v0.1.8. Leave empty to run verification only."
        required: false
        type: string

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || github.ref }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Install Root npm Workspace
        run: npm ci

      - name: Verify root CLI default
        run: cargo run -- --help

      - name: Verify Rust-To-TypeScript Schema Bindings
        run: npm run check:vsr-schema

      - name: Verify npm Package Wrapper And Types
        run: npm run check:vsr-package

      - name: Pack npm package
        run: |
          mkdir -p target/npm-pack
          npm pack --workspace @matiashiltunen/vsr --pack-destination target/npm-pack

      - name: Test CLI crate
        run: cargo test -p vsra -- --skip build_server_binary_bridgeboard_supports_clean_room_e2e

      - name: Package core publish dependency
        run: cargo package -p rest_macro_core --features codegen,turso-local --locked

      - name: Verify CLI lockfile is publish-ready
        run: cargo check -p vsra --locked

  publish:
    needs: verify
    if: |
      needs.verify.result == 'success' &&
      (
        startsWith(github.ref, 'refs/tags/vsra-v') ||
        (github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag != '')
      )
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || github.ref }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Install Root npm Workspace
        run: npm ci

      - name: Verify tag matches CLI version
        env:
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || github.ref_name }}
        run: |
          python - <<'PY'
          import json
          import os
          import subprocess
          import sys

          metadata = json.loads(
              subprocess.check_output(["cargo", "metadata", "--no-deps", "--format-version", "1"])
          )
          cli = next(pkg for pkg in metadata["packages"] if pkg["name"] == "vsra")
          npm_pkg = json.loads(open("packages/vsr/package.json", "r", encoding="utf-8").read())
          expected = f"vsra-v{cli['version']}"
          actual = os.environ["RELEASE_TAG"]
          if actual != expected:
              print(f"tag mismatch: expected {expected}, got {actual}", file=sys.stderr)
              sys.exit(1)
          if npm_pkg["version"] != cli["version"]:
              print(
                  f"npm version mismatch: expected {cli['version']}, got {npm_pkg['version']}",
                  file=sys.stderr,
              )
              sys.exit(1)
          print(f"publishing {cli['name']} {cli['version']} from {actual}")
          PY

      - name: Publish core dependency if needed
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail
          version="$(python - <<'PY'
          import json, subprocess
          metadata = json.loads(
              subprocess.check_output(["cargo", "metadata", "--no-deps", "--format-version", "1"])
          )
          pkg = next(pkg for pkg in metadata["packages"] if pkg["name"] == "rest_macro_core")
          print(pkg["version"])
          PY
          )"

          if cargo info --index https://github.com/rust-lang/crates.io-index "rest_macro_core@${version}" > /dev/null 2>&1; then
            echo "rest_macro_core ${version} already published"
          else
            cargo publish -p rest_macro_core --features codegen,turso-local --locked
          fi

      - name: Wait for core dependency to propagate
        run: |
          set -euo pipefail
          version="$(python - <<'PY'
          import json, subprocess
          metadata = json.loads(
              subprocess.check_output(["cargo", "metadata", "--no-deps", "--format-version", "1"])
          )
          pkg = next(pkg for pkg in metadata["packages"] if pkg["name"] == "rest_macro_core")
          print(pkg["version"])
          PY
          )"

          for attempt in $(seq 1 20); do
            if cargo info --index https://github.com/rust-lang/crates.io-index "rest_macro_core@${version}" > /dev/null 2>&1; then
              echo "rest_macro_core ${version} is available"
              exit 0
            fi
            echo "waiting for rest_macro_core ${version} to appear on crates.io (${attempt}/20)"
            sleep 15
          done

          echo "rest_macro_core ${version} did not appear on crates.io in time" >&2
          exit 1

      - name: Publish CLI crate if needed
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail
          version="$(python - <<'PY'
          import json, subprocess
          metadata = json.loads(
              subprocess.check_output(["cargo", "metadata", "--no-deps", "--format-version", "1"])
          )
          pkg = next(pkg for pkg in metadata["packages"] if pkg["name"] == "vsra")
          print(pkg["version"])
          PY
          )"

          if cargo info --index https://github.com/rust-lang/crates.io-index "vsra@${version}" > /dev/null 2>&1; then
            echo "vsra ${version} already published"
          else
            cargo publish -p vsra --locked
          fi

      - name: Publish npm package if needed
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "NPM_TOKEN is not configured; skipping npm publish"
            exit 0
          fi

          version="$(node -p "require('./packages/vsr/package.json').version")"

          if npm view "@matiashiltunen/vsr@${version}" version >/dev/null 2>&1; then
            echo "@matiashiltunen/vsr ${version} already published"
          else
            npm publish --workspace @matiashiltunen/vsr --access public
          fi
